<!DOCTYPE html>

  <!-- Header -->

    <div class="container nav-container">
      <div class="logo">YourName</div>
      <nav>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="container hero-content">
      <h1 class="hero-name">Your Name</h1>
      <p class="hero-tagline">
        用設計的溫度，打造優雅且直覺的數位體驗

      <h2 class="section-title">About Me</h2>
      <p class="about-text">
        你好！我是一位熱愛美學的前端工程師。我擅長在技術實踐與視覺平衡之間找到完美的交集。
        對我而言，程式碼不僅是邏輯，更是傳遞溫度的媒介。我致力於運用優雅的介面設計與流暢的動態效果，
        為使用者創造如清晨微風般舒適的瀏覽體驗。
      </p>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="contact section">
    <div class="container">
      <h2 class="section-title">Contact</h2>
      <div class="contact-list">
        <p>Email: <a href="mailto:your@email.com">your@email.com</a></p>
        <p>GitHub: <a href="#" target="_blank">github.com/yourname</a></p>
        <p>LinkedIn: <a href="#" target="_blank">linkedin.com/in/yourname</a></p>
      </div>
    </div>
